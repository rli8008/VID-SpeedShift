<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VID SpeedShift</title>

  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --border: #cccccc;
      --control-bg: #f5f5f5;
      --active: #0060df;
      --hover: #e0e0e0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1b22;
        --fg: #f9f9fa;
        --border: #4a4a4f;
        --control-bg: #2b2a33;
        --active: #0d99ff;
        --hover: #38383d;
      }
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 12px;
      width: 240px;
      background: var(--bg);
      color: var(--fg);
    }

    .value {
      text-align: center;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 16px;
    }

    input[type="range"] {
      width: 100%;
      margin-bottom: 4px;
    }

    .ticks {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-bottom: 8px;
      opacity: 0.75;
    }

    input[type="number"] {
      width: 100%;
      margin-bottom: 10px;
      box-sizing: border-box;
      background: var(--control-bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px;
    }

    
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.75;
      margin-bottom: 8px;
      user-select: none;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .preset-btn {
      padding: 6px 0;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--control-bg);
      color: var(--fg);
      cursor: pointer;
    }

    .preset-btn.active {
      background: var(--active);
      color: white;
      border-color: var(--active);
    }

    .preset-btn:hover {
      background: var(--hover);
    }
  </style>
</head>

<body>

  <div class="value" id="speedLabel">1.00×</div>

  <input
    type="range"
    id="speedSlider"
    min="0.25"
    max="7"
    step="0.25"
    value="1"
    aria-label="Playback speed slider"
  />


<div class="range-labels">
  <span>Slow</span>
  <span>Fast</span>
</div>

  
  <input
    type="number"
    id="speedInput"
    min="0.25"
    max="7"
    step="0.05"
    value="1"
    aria-label="Manual playback speed"
  />

  <div class="presets">
    <button class="preset-btn" data-speed="1">1×</button>
    <button class="preset-btn" data-speed="1.25">1.25×</button>
    <button class="preset-btn" data-speed="1.5">1.5×</button>
    <button class="preset-btn" data-speed="2">2×</button>

    <button class="preset-btn" data-speed="2.5">2.5×</button>
    <button class="preset-btn" data-speed="3">3×</button>
    <button class="preset-btn" data-speed="4">4×</button>
    <button class="preset-btn" data-speed="5">5×</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
